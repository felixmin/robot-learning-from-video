# @package _global_

defaults:
  - /model/shared@stage2_policy_core: stage2_policy_core
  - /model@model: stage2_smol_flow_shared
  - /data@data: octo24
  - /training@training: stage2_policy_lightning

submit:
  script: 4_train_stage2_policy
  torchrun: true

data:
  loader:
    batch_size: 16
    num_workers: 8
    pin_memory: true
    prefetch_factor: 2
  output_format: stage2
  request:
    image_requests:
      primary:
        deltas_steps: [0, 1]
        required: true
    state_request:
      deltas_steps: [0]
    include_task_text: true
  adapter:
    lerobot_v3:
      steps_per_epoch: 5000

stage2_policy_core:
  policy:
    image_size: [256, 256]

training:
  max_steps: 50000
  validation:
    check_interval: 1000
    limit_batches: 20
  checkpoint:
    every_n_train_steps: 1000

logging:
  use_wandb: true
