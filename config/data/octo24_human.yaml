loader:
  batch_size: 64
  num_workers: 8
  pin_memory: true
  prefetch_factor: 2

preprocess:
  image_size: 256
  return_metadata: true

request:
  image_requests:
    primary:
      deltas_steps: [0, 1]
      required: true
  state_request: null
  action_request: null
  include_task_text: true
  include_subtask_text: false
  include_metadata: true
  pad_missing_future: true
  image_size:
    - ${data.preprocess.image_size}
    - ${data.preprocess.image_size}
  image_dtype: uint8

output_format: raw

adapter:
  lerobot_v3:
    seed: 42
    steps_per_epoch: 5000
    resample_each_epoch: true
    weights_mode: explicit
