# @package _group_

# Rich validation preset for LAM cluster training.
# Includes per-dataset buckets plus flow/sequence/transfer/scatter analyses.

check_interval: 1000
limit_batches: 250
check_val_every_n_epoch: null
max_cached_samples: 512
num_fixed_samples: 8
num_random_samples: 8

buckets:
  language_table:
    filters: {dataset_short: "language_table"}
    max_samples: 128
  bridge:
    filters: {dataset_short: "bridge_v2"}
    max_samples: 128
  rt1:
    filters: {dataset_short: "fractal20220817_data"}
    max_samples: 128
  robonet:
    filters: {dataset_short: "robonet"}
    max_samples: 128
  droid:
    filters: {dataset_short: "droid"}
    max_samples: 128
  kuka:
    filters: {dataset_short: "kuka"}
    max_samples: 128
  taco_play:
    filters: {dataset_short: "taco_play"}
    max_samples: 128
  roboturk:
    filters: {dataset_short: "roboturk"}
    max_samples: 128
  jaco_play:
    filters: {dataset_short: "jaco_play"}
    max_samples: 128
  berkeley_autolab_ur5:
    filters: {dataset_short: "berkeley_autolab_ur5"}
    max_samples: 128

strategies:
  basic:
    type: basic
    enabled: true
    every_n_validations: 1
    visualize_train: true
    visualize_val: true
    visualize_per_bucket: true
  flow_visualization:
    type: flow_visualization
    enabled: true
    every_n_validations: 1
    num_samples: 8
  codebook_histogram:
    type: codebook_histogram
    enabled: true
    every_n_validations: 2
  codebook_embedding:
    type: codebook_embedding
    enabled: true
    every_n_validations: 2
    method: umap
    pca_components: 50
  sequence_histogram:
    type: sequence_histogram
    enabled: true
    every_n_validations: 2
    num_top_sequences: 50
  all_sequences_histogram:
    type: all_sequences_histogram
    enabled: true
    every_n_validations: 2
  sequence_examples:
    type: sequence_examples
    enabled: true
    every_n_validations: 2
    top_k_sequences: 16
    examples_per_sequence: 4
  transfer_language_table:
    type: latent_transfer
    buckets: ["language_table"]
    every_n_validations: 3
    num_pairs: 128
  transfer_bridge:
    type: latent_transfer
    buckets: ["bridge"]
    every_n_validations: 3
    num_pairs: 128
  transfer_rt1:
    type: latent_transfer
    buckets: ["rt1"]
    every_n_validations: 3
    num_pairs: 128
  transfer_robonet:
    type: latent_transfer
    buckets: ["robonet"]
    every_n_validations: 3
    num_pairs: 128
  action_scatter_language_table:
    type: action_token_scatter
    buckets: ["language_table"]
    every_n_validations: 3
    num_samples: 256
  action_scatter_bridge:
    type: action_token_scatter
    buckets: ["bridge"]
    every_n_validations: 3
    num_samples: 256
  action_scatter_rt1:
    type: action_token_scatter
    buckets: ["rt1"]
    every_n_validations: 3
    num_samples: 256
  action_scatter_robonet:
    type: action_token_scatter
    buckets: ["robonet"]
    every_n_validations: 3
    num_samples: 256
