# @package _group_

# Rich validation preset for local LAM runs.

check_interval: 1000
limit_batches: 50
check_val_every_n_epoch: null
max_cached_samples: 100
num_fixed_samples: 4
num_random_samples: 4

buckets:
  language_table:
    filters: {dataset_short: "language_table"}
    max_samples: 20
  bridge:
    filters: {dataset_short: "bridge_v2"}
    max_samples: 20
  rt1:
    filters: {dataset_short: "fractal20220817_data"}
    max_samples: 20
  robonet:
    filters: {dataset_short: "robonet"}
    max_samples: 20

strategies:
  basic:
    type: basic
    enabled: true
    every_n_validations: 1
    num_fixed_samples: 4
    num_random_samples: 4
    visualize_train: true
    visualize_val: true
    visualize_per_bucket: true

  permuted_latent_visualization:
    type: permuted_latent_visualization
    enabled: true
    every_n_validations: 1
    num_samples: 4

  top_sequence_applications:
    type: top_sequence_applications
    enabled: true
    every_n_validations: 1
    top_k_sequences: 12

  flow_visualization:
    type: flow_visualization
    enabled: true
    every_n_validations: 1
    num_samples: 8

  codebook_histogram:
    type: codebook_histogram
    enabled: true
    every_n_validations: 1
  codebook_embedding:
    type: codebook_embedding
    enabled: true
    every_n_validations: 1
    method: umap
    pca_components: 50
  sequence_histogram:
    type: sequence_histogram
    enabled: true
    every_n_validations: 1
    num_top_sequences: 50
  all_sequences_histogram:
    type: all_sequences_histogram
    enabled: true
    every_n_validations: 1
  sequence_examples:
    type: sequence_examples
    enabled: true
    every_n_validations: 1
    top_k_sequences: 16
    examples_per_sequence: 4

  action_scatter_language_table:
    type: action_token_scatter
    buckets: ["language_table"]
    enabled: false
    every_n_validations: 1
    num_samples: 128
  action_scatter_bridge:
    type: action_token_scatter
    buckets: ["bridge"]
    enabled: false
    every_n_validations: 1
    num_samples: 128
  action_scatter_rt1:
    type: action_token_scatter
    buckets: ["rt1"]
    enabled: false
    every_n_validations: 1
    num_samples: 128
  action_scatter_robonet:
    type: action_token_scatter
    buckets: ["robonet"]
    enabled: false
    every_n_validations: 1
    num_samples: 128

  action_seq_language_table:
    type: action_sequence_scatter
    buckets: ["language_table"]
    enabled: false
    every_n_validations: 1
    num_samples: 128
  action_seq_bridge:
    type: action_sequence_scatter
    buckets: ["bridge"]
    enabled: false
    every_n_validations: 1
    num_samples: 128
  action_seq_rt1:
    type: action_sequence_scatter
    buckets: ["rt1"]
    enabled: false
    every_n_validations: 1
    num_samples: 128
  action_seq_robonet:
    type: action_sequence_scatter
    buckets: ["robonet"]
    enabled: false
    every_n_validations: 1
    num_samples: 128

  top_seq_language_table:
    type: top_sequences_scatter
    buckets: ["language_table"]
    enabled: false
    every_n_validations: 1
    num_samples: 128
    num_top_sequences: 5
  top_seq_bridge:
    type: top_sequences_scatter
    buckets: ["bridge"]
    enabled: false
    every_n_validations: 1
    num_samples: 128
    num_top_sequences: 5
  top_seq_rt1:
    type: top_sequences_scatter
    buckets: ["rt1"]
    enabled: false
    every_n_validations: 1
    num_samples: 128
    num_top_sequences: 5
  top_seq_robonet:
    type: top_sequences_scatter
    buckets: ["robonet"]
    enabled: false
    every_n_validations: 1
    num_samples: 128
    num_top_sequences: 5

  state_scatter_language_table:
    type: state_sequence_scatter
    buckets: ["language_table"]
    enabled: false
    every_n_validations: 1
    num_samples: 128
  state_scatter_bridge:
    type: state_sequence_scatter
    buckets: ["bridge"]
