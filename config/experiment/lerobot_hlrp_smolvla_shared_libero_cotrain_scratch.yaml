# @package _global_

defaults:
  - /cluster@cluster: local_dev
  - optional /user_config: local

experiment:
  name: lerobot_hlrp_smolvla_shared_libero_cotrain_scratch
  description: "Stage 3 Libero train (HLRP shared policy scratch init, latent+action alternating)"

submit:
  script: 6_train_lerobot

logging:
  use_wandb: true
  tags: ["stage3", "lerobot", "libero", "hlrp-policy", "smolvla", "scratch", "cotrain"]

lerobot:
  command: lerobot-train
  install_policy_editable: null

  policy_type: hlrp_smolvla_shared
  policy_repo_id: felixmin/hlrp_smolvla_shared_libero_cotrain_scratch
  policy_device: cuda
  push_to_hub: false
  wandb_enable: true

  init_mode: scratch
  stage2_artifact: null

  dataset_repo_id: HuggingFaceVLA/libero
  dataset_episodes: null

  env_type: libero
  env_task: libero_10
  output_dir: ${logging.runs_dir}/lerobot_smolvla_shared_libero_cotrain_scratch
  job_name: ${experiment.name}

  steps: 100000
  batch_size: 64
  num_workers: 4
  eval_freq: 20000
  eval_batch_size: 2
  log_freq: 200
  save_freq: 20000

  env:
    MUJOCO_GL: egl
    HF_HOME: /mnt/data/tmp/hf
    HF_HUB_CACHE: /mnt/data/tmp/hf/hub
    HF_DATASETS_CACHE: /mnt/data/tmp/hf/datasets

  extra_args:
    - --dataset.root=/mnt/data/workspace/hflibero/datasets--HuggingFaceVLA--libero/snapshots/86958911c0f959db2bbbdb107eb3e17c5f9c798e
    - --policy.stage3_training_mode=alternating
    - --policy.action_loss_weight=1.0
    - --policy.latent_loss_weight=1.0
    - --policy.alternating_latent_steps=10
    - --policy.alternating_supervised_mode=multitask
    - --policy.laq_checkpoint_path=???
    - --policy.laq_future_frames=10
    - --policy.laq_camera_keys=[observation.images.image]
    - --policy.load_vlm_weights=true
    - --policy.train_expert_only=true
    - --policy.freeze_vision_encoder=true
    - --policy.num_vlm_layers=16
    - --policy.image_size=[512,512]
    - --policy.latent_vector_dim=32
    - --policy.flow_steps=10
    - --policy.chunk_size=50
    - --policy.tokenizer_max_length=48
    - --policy.pad_language_to=longest
    - --dataset.use_imagenet_stats=false
    - --policy.n_action_steps=50
    - --optimizer.type=adamw
    - --optimizer.betas=[0.9,0.95]
    - --scheduler.type=cosine_decay_with_warmup
    - --scheduler.num_warmup_steps=100
    - --scheduler.num_decay_steps=99900
    - --scheduler.peak_lr=1e-4
    - --scheduler.decay_lr=2.5e-6
    - --eval.n_episodes=10
    - --dataset.video_backend=pyav
    - --env.observation_height=512
    - --env.observation_width=512
    - --use_policy_training_preset=false
