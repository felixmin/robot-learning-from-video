# @package _global_

defaults:
  - /model@model: lam
  - /data@data: octo24
  - /training@training: stage1_optimizer

submit:
  script: 2_train_stage1_lam

data:
  output_format: stage1
  adapter:
    lerobot_v3:
      steps_per_epoch: 5000

training:
  max_steps: 50000
  log_every_n_steps: 10
  checkpoint:
    every_n_train_steps: 1000

logging:
  use_wandb: true
