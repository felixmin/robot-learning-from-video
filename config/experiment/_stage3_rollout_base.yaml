# @package _global_

# Stage 3: LeRobot rollout/eval for shared SmolVLA HLRP policy.

submit:
  script: 7_rollout_lerobot

cluster:
  container:
    image: /dss/dssmcmlfs01/pn57pi/pn57pi-dss-0001/felix_minzenmay/enroot/hlrp_stage3_lerobot.sqsh
    python_bin: /opt/lerobot-venv/bin/python

logging:
  use_wandb: false
  tags: ["stage3", "lerobot", "rollout", "hlrp-policy", "smolvla"]

lerobot_eval:
  command: lerobot-eval
  install_editables: [lerobot, lerobot_policy_hlrp]

  policy_path: null
  policy_device: cuda
  policy_use_amp: false

  env_type: libero
  env_task: libero_spatial,libero_object,libero_goal,libero_10
  eval_n_episodes: 10
  eval_batch_size: 1

  output_dir: ${logging.runs_dir}
  job_name: ${experiment.name}
  seed: 1000
  trust_remote_code: false

  extra_args: ["--env.max_parallel_tasks=1"]
