# Stage 2 (Foundation) Lightning training settings (non-debug defaults).

max_steps: 200000
max_epochs: 1000
accumulate_grad_batches: 2
precision: bf16-mixed
gradient_clip_val: 1.0
log_every_n_steps: 10
resume_from_checkpoint: null

optimizer:
  lr: 1.0e-5
  weight_decay: 0.01

validation:
  # Validate every N training steps (epochs are huge with streaming datasets).
  check_interval: 1000
  # Keep validation bounded (int batches or float fraction).
  limit_batches: 50
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  pipeline:
    enabled: true
    max_cached_samples: 256
    num_fixed_samples: 8
    run_gc_after_validation: true
    buckets: {}
    checks:
      sample_panels:
        type: sample_panels
        enabled: true
        num_samples: 4
        include_freeform_pred: false
        freeform_max_new_tokens: 32
      latent_flow_decode:
        type: latent_flow_decode
        enabled: true
        laq_checkpoint_path: ${model.laq.checkpoint}
        num_samples: 4
        max_decode_batch_size: 2
      token_distribution:
        type: token_distribution
        enabled: true

train_visualization:
  enabled: true
  num_samples: 4
  every_n_steps: 1000
  include_freeform_pred: false
  freeform_max_new_tokens: 32

throughput:
  enabled: true
  log_every_n_steps: 10

dataset_usage_logger:
  enabled: true
  log_on_validation_end: true
  log_every_n_steps: null
  log_batch_composition_every_n_steps: 100
  key: dataset_name
  top_k: 12

progress_logger:
  enabled: true
  log_every_n_steps: 100

checkpoint:
  monitor: val/loss
  mode: min
  save_top_k: 2
  save_last: true
  save_weights_only: false
  every_n_train_steps: 1000

# Optional: log teacher-forced code-token diagnostics on *training* batches.
# Set small (e.g. 1 or 10) for overfit/debug runs; keep null for production.
train_teacher_forced_metrics_every_n_steps: null

# Optional Lightning debug controls.
# - Set `overfit_batches=1` to sanity-check that loss and accuracy improve on a single batch.
# - Use `limit_train_batches` to bound epoch length for non-step-based runs.
overfit_batches: null
limit_train_batches: null

profiler:
  enabled: false
  type: advanced
  dirpath: ./profiles
  filename: profile
