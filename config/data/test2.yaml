# @package data

# Octo-style 24-dataset OXE composition mapped onto LeRobot v3 repos after
# excluding the unresolved `kuka` port and swapping broken official ports to
# working community mirrors where needed.

backend: lerobot_v3

dataset:
  lerobot:
    sources:
      - repo_id: FedorX8/berkeley_cable_routing_lerobot
        revision: main
        weight: 0.363
        camera_map:
          primary: observation.images.image
        state_key: observation.state
        action_key: action
        video_backend: pyav
        val_episode_count: 2

      - repo_id: lerobot/nyu_door_opening_surprising_effectiveness
        revision: v3.0
        weight: 0.121
        camera_map:
          primary: observation.images.image
        state_key: observation.state
        action_key: action
        video_backend: pyav
        val_episode_count: 2


loader:
  batch_size: 64
  num_workers: 8
  pin_memory: true
  prefetch_factor: 2

preprocess:
  image_size: 256
  return_metadata: true

request:
  image_requests:
    primary:
      deltas_steps: [0, 1]
      required: true
  state_request: null
  action_request: null
  include_task_text: true
  include_subtask_text: false
  include_metadata: true
  pad_missing_future: true
  image_size:
    - ${data.preprocess.image_size}
    - ${data.preprocess.image_size}
  image_dtype: uint8

output_format: raw

adapter:
  lerobot_v3:
    seed: 42
    steps_per_epoch: 5000
    resample_each_epoch: true
    weights_mode: explicit
